<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GhostScreen</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <section class="explorer">
        <button class="explorer-toggle" type="button">Explorer</button>
        <ul class="file-list">
          <li>main.py</li>
          <li>utils.py</li>
          <li>app.js</li>
        </ul>
      </section>

      <nav class="menu">
        <button type="button">Code Editor</button>
        <button type="button">Terminal</button>
        <button type="button">AI Assistant</button>
        <button type="button">History</button>
        <button type="button">Stats</button>
        <button type="button">Settings</button>
      </nav>
    </aside>

    <header class="topbar">
      <h1>GhostScreen</h1>
      <div class="topbar-actions">
        <button type="button">Open</button>
        <button type="button">Theme</button>
        <button type="button">Run Code</button>
        <button type="button">Explain Code</button>
      </div>
    </header>

    <main class="main">
      <div class="editor-wrap">
        <div class="line-numbers">1</div>
        <textarea class="code-editor" spellcheck="false"></textarea>
      </div>
    </main>

    <aside class="stats-strip">
      <div class="stat-item"><span>▶</span><strong>0</strong></div>
      <div class="stat-item"><span>⚠</span><strong>0</strong></div>
      <div class="stat-item"><span>✓</span><strong>0%</strong></div>
      <div class="stat-item"><span>★</span><strong>0</strong></div>
    </aside>

    <section class="bottom-panel">
      <div class="tabs">
        <button class="tab active" type="button">Output / Error</button>
        <button class="tab" type="button">AI Explanation</button>
      </div>

      <div class="tab-content output-content">
        <pre></pre>
      </div>

      <div class="tab-content ai-content" hidden>
        <p></p>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
